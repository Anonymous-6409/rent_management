<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Change Password')}"></head>
<body>
<div th:replace="~{fragments/layout :: page('Change Password', 'account', ~{::content})}">
    <th:block th:fragment="content">

        <div th:if="${param.changed}" class="alert"
             style="background:#dcfce7;border-color:#bbf7d0;color:#15803d;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>Your password has been changed.</span>
        </div>

        <div class="panel form-panel">
            <div class="panel-header">
                <h2>Change Password</h2>
            </div>
            <div class="panel-body">
                <form th:action="@{/account/password}" th:object="${changePasswordForm}" method="post">
                    <div class="form-grid">
                        <div class="form-group col-span-2">
                            <label>Current password</label>
                            <input type="password" th:field="*{currentPassword}"/>
                            <div class="error" th:if="${#fields.hasErrors('currentPassword')}"
                                 th:errors="*{currentPassword}"></div>
                        </div>

                        <div class="form-group">
                            <label>New password</label>
                            <input type="password" th:field="*{newPassword}" placeholder="At least 6 characters"/>
                            <div class="error" th:if="${#fields.hasErrors('newPassword')}"
                                 th:errors="*{newPassword}"></div>
                        </div>

                        <div class="form-group">
                            <label>Confirm new password</label>
                            <input type="password" th:field="*{confirmPassword}"/>
                            <div class="error" th:if="${#fields.hasErrors('confirmPassword')}"
                                 th:errors="*{confirmPassword}"></div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Update password</button>
                        <a class="btn btn-light" th:href="@{/}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

    </th:block>
</div>
</body>
</html>
