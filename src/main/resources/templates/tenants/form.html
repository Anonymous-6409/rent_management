<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Tenant Form')}"></head>
<body>
<div th:replace="~{fragments/layout :: page(${tenant.id == null} ? 'Add Tenant' : 'Edit Tenant', 'tenants', ~{::content})}">
    <th:block th:fragment="content">

        <div class="panel form-panel">
            <div class="panel-body">
                <form th:action="@{/tenants/save}" th:object="${tenant}" method="post">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="form-grid">
                        <div class="form-group col-span-2">
                            <label>Name</label>
                            <input type="text" th:field="*{name}" placeholder="e.g. Jane Doe"/>
                            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" th:field="*{email}" placeholder="jane@example.com"/>
                            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>

                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" th:field="*{phone}" placeholder="555-0100"/>
                            <div class="error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                        </div>

                        <div class="form-group col-span-2">
                            <label>Property</label>
                            <select th:field="*{property}">
                                <option th:value="null">-- None --</option>
                                <option th:each="p : ${properties}" th:value="${p.id}" th:text="${p.name}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Lease Start</label>
                            <input type="date" th:field="*{leaseStart}"/>
                        </div>

                        <div class="form-group">
                            <label>Lease End</label>
                            <input type="date" th:field="*{leaseEnd}"/>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Tenant</button>
                        <a class="btn btn-light" th:href="@{/tenants}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

    </th:block>
</div>
</body>
</html>
