<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Property Form')}"></head>
<body>
<div th:replace="~{fragments/layout :: page(${property.id == null} ? 'Add Property' : 'Edit Property', 'properties', ~{::content})}">
    <th:block th:fragment="content">

        <div class="panel form-panel">
            <div class="panel-body">
                <form th:action="@{/properties/save}" th:object="${property}" method="post">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="form-grid">
                        <div class="form-group col-span-2">
                            <label>Name</label>
                            <input type="text" th:field="*{name}" placeholder="e.g. Maple Court"/>
                            <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                        </div>

                        <div class="form-group col-span-2">
                            <label>Address</label>
                            <input type="text" th:field="*{address}" placeholder="12 Maple St"/>
                            <div class="error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></div>
                        </div>

                        <div class="form-group">
                            <label>Type</label>
                            <input type="text" th:field="*{type}" placeholder="Apartment, House, Studio, Commercial"/>
                            <div class="error" th:if="${#fields.hasErrors('type')}" th:errors="*{type}"></div>
                        </div>

                        <div class="form-group">
                            <label>Monthly Rent</label>
                            <input type="number" step="0.01" th:field="*{monthlyRent}" placeholder="1200.00"/>
                            <div class="error" th:if="${#fields.hasErrors('monthlyRent')}" th:errors="*{monthlyRent}"></div>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select th:field="*{status}">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Owner</label>
                            <select th:field="*{owner}">
                                <option th:value="null">-- None --</option>
                                <option th:each="o : ${owners}" th:value="${o.id}" th:text="${o.name}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Property</button>
                        <a class="btn btn-light" th:href="@{/properties}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

    </th:block>
</div>
</body>
</html>
