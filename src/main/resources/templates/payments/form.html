<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Payment Form')}"></head>
<body>
<div th:replace="~{fragments/layout :: page(${payment.id == null} ? 'Record Payment' : 'Edit Payment', 'payments', ~{::content})}">
    <th:block th:fragment="content">

        <div class="panel form-panel">
            <div class="panel-body">
                <form th:action="@{/payments/save}" th:object="${payment}" method="post">
                    <input type="hidden" th:field="*{id}"/>

                    <div class="form-grid">
                        <div class="form-group col-span-2">
                            <label>Tenant</label>
                            <select th:field="*{tenant}">
                                <option th:value="null">-- Select Tenant --</option>
                                <option th:each="t : ${tenants}" th:value="${t.id}" th:text="${t.name}"></option>
                            </select>
                            <div class="error" th:if="${#fields.hasErrors('tenant')}" th:errors="*{tenant}"></div>
                        </div>

                        <div class="form-group">
                            <label>Period (Month)</label>
                            <input type="text" th:field="*{periodMonth}" placeholder="2026-06"/>
                            <div class="error" th:if="${#fields.hasErrors('periodMonth')}" th:errors="*{periodMonth}"></div>
                        </div>

                        <div class="form-group">
                            <label>Amount</label>
                            <input type="number" step="0.01" th:field="*{amount}" placeholder="1200.00"/>
                            <div class="error" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
                        </div>

                        <div class="form-group">
                            <label>Payment Date</label>
                            <input type="date" th:field="*{paymentDate}"/>
                            <div class="error" th:if="${#fields.hasErrors('paymentDate')}" th:errors="*{paymentDate}"></div>
                        </div>

                        <div class="form-group">
                            <label>Status</label>
                            <select th:field="*{status}">
                                <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                            </select>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Payment</button>
                        <a class="btn btn-light" th:href="@{/payments}">Cancel</a>
                    </div>
                </form>
            </div>
        </div>

    </th:block>
</div>
</body>
</html>
