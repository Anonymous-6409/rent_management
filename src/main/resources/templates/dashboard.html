<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Dashboard')}"></head>
<body>
<div th:replace="~{fragments/layout :: page('Dashboard', 'dashboard', ~{::content})}">
    <th:block th:fragment="content">

        <div class="cards">
            <div class="stat" sec:authorize="hasRole('ADMIN')">
                <div class="stat-icon ic-blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                </div>
                <span class="label">Owners</span>
                <span class="value" th:text="${ownerCount}">0</span>
            </div>

            <div class="stat">
                <div class="stat-icon ic-indigo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <span class="label">Properties</span>
                <span class="value" th:text="${propertyCount}">0</span>
            </div>

            <div class="stat">
                <div class="stat-icon ic-amber">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <span class="label">Tenants</span>
                <span class="value" th:text="${tenantCount}">0</span>
            </div>

            <div class="stat">
                <div class="stat-icon ic-green">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"/>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <span class="label">Rent Collected</span>
                <span class="value" th:text="'$' + ${#numbers.formatDecimal(totalCollected, 1, 2)}">$0.00</span>
            </div>

            <div class="stat">
                <div class="stat-icon ic-rose">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                </div>
                <span class="label">Reminders</span>
                <span class="value" th:text="${reminderCount}">0</span>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <h2>Recent Payments</h2>
                <a class="btn btn-primary" th:href="@{/payments/new}" sec:authorize="hasAnyRole('ADMIN','OWNER')">+ Record Payment</a>
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Tenant</th>
                        <th>Period</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${recentPayments}">
                        <td class="cell-strong" th:text="${p.tenant != null ? p.tenant.name : '-'}">Tenant</td>
                        <td th:text="${p.periodMonth}">2026-06</td>
                        <td class="cell-strong" th:text="'$' + ${#numbers.formatDecimal(p.amount, 1, 2)}">$0.00</td>
                        <td class="cell-muted" th:text="${p.paymentDate}">2026-06-01</td>
                        <td><span class="badge" th:classappend="'badge-' + ${p.status}" th:text="${p.status}">PAID</span></td>
                    </tr>
                    <tr th:if="${recentPayments.isEmpty()}">
                        <td colspan="5" class="empty">No payments recorded yet.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </th:block>
</div>
</body>
</html>
