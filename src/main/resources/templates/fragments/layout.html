<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${title} + ' · RentManager'">Rent Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<!-- =========================================================
     Full-page shell:  page(title, active, content)
     ========================================================= -->
<div th:fragment="page(title, active, content)" class="app-shell">

    <aside class="sidebar">
        <a class="brand" th:href="@{/}">
            <span class="brand-logo">RM</span>
            <span class="brand-text">RentManager</span>
        </a>

        <nav class="nav">
            <a th:href="@{/}" class="nav-item" th:classappend="${active == 'dashboard'} ? ' active'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                </svg>
                <span>Dashboard</span>
            </a>
            <a th:href="@{/owners}" class="nav-item" th:classappend="${active == 'owners'} ? ' active'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                <span>Owners</span>
            </a>
            <a th:href="@{/properties}" class="nav-item" th:classappend="${active == 'properties'} ? ' active'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>Properties</span>
            </a>
            <a th:href="@{/tenants}" class="nav-item" th:classappend="${active == 'tenants'} ? ' active'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span>Tenants</span>
            </a>
            <a th:href="@{/payments}" class="nav-item" th:classappend="${active == 'payments'} ? ' active'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
                <span>Payments</span>
            </a>
            <a th:href="@{/reminders}" class="nav-item" th:classappend="${active == 'reminders'} ? ' active'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span>Reminders</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="su-avatar">RM</div>
            <div class="su-meta">
                <span class="su-name">Rent Manager</span>
                <span class="su-role">Administrator</span>
            </div>
        </div>
    </aside>

    <div class="main">
        <header class="topbar">
            <div>
                <h1 class="page-title" th:text="${title}">Page</h1>
            </div>
            <div class="topbar-right">
                <span class="topbar-date"
                      th:text="${#dates.format(#dates.createNow(), 'EEE, dd MMM yyyy')}">Today</span>
            </div>
        </header>

        <main class="content">
            <th:block th:replace="${content}">Page content goes here</th:block>
        </main>
    </div>
</div>

</body>
</html>
