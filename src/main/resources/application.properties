#spring.datasource.password=root
spring.datasource.password=ZaqWsx#1234#
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# Thymeleaf
# ===============================
spring.thymeleaf.cache=false

# ===============================
# Payment Reminders
# ===============================
# Day of the month rent is considered due (used to compute the due date).
app.reminders.due-day=5
# Cron for the scheduled job that generates + sends reminders (default: daily 09:00).
app.reminders.cron=0 0 9 * * *
# When true, reminders are emailed via SMTP. When false they are only persisted + logged.
app.reminders.email.enabled=true
# Optional "from" address used on reminder emails.
app.reminders.email.from=no-reply@rentmanager.local

# ===============================
# Mail (only needed when app.reminders.email.enabled=true)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
