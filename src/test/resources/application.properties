# ===============================
# Test profile - in-memory H2 (MySQL compatibility mode)
# Overrides src/main/resources/application.properties on the test classpath
# so tests run without a live MySQL instance.
# ===============================
spring.datasource.url=jdbc:h2:mem:rent_management_test;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

spring.thymeleaf.cache=false
